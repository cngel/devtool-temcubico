<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketplace Escolar</title>

<style>
/* RESET */
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial;
    background:#f6efe9;
}

/* HEADER */
.header{
    position:sticky;top:0;z-index:100;
    background:rgba(255,248,240,0.9);
    backdrop-filter:blur(10px);
    border-bottom:1px solid #e0cfc2;
}

.header-content{padding:12px 16px}

.header-title{
    font-size:28px;
    font-weight:700;
    color:#5c3a21;
}

.search-input{
    width:100%;
    padding:12px 12px 12px 16px;
    background:#efe2d6;
    border:none;
    border-radius:12px;
    outline:none;
}

/* CATEGORY */
.category-filter{
    padding:16px 0;
    background:white;
}

.category-scroll{
    display:flex;gap:8px;
    overflow:auto;padding:0 16px;
}

.category-chip{
    padding:8px 16px;
    background:#efe2d6;
    border:none;
    border-radius:20px;
    color:#5c3a21;
    cursor:pointer;
}

.category-chip.active{
    background:#8b5e3c;
    color:white;
}

/* PRODUCTS */
.products-container{padding:16px}

.products-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
}

.product-card{
    background:white;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.product-image{
    width:100%;aspect-ratio:1;
    background:#f3e7dc;
}

.product-image img{
    width:100%;height:100%;object-fit:cover;
}

.product-info{padding:12px}

.product-name{
    font-size:14px;
    font-weight:600;
    color:#3e2723;
}

.product-store{
    font-size:12px;
    color:#a1887f;
}

.product-footer{
    display:flex;
    justify-content:space-between;
    margin-top:6px;
}

.product-price{
    font-size:18px;
    font-weight:bold;
    color:#8b5e3c;
}

.product-category{
    font-size:10px;
    background:#efe2d6;
    padding:4px 8px;
    border-radius:10px;
    color:#8d6e63;
}

/* NAV */
.bottom-nav{
    position:fixed;bottom:0;left:0;right:0;
    display:flex;justify-content:space-around;
    background:rgba(255,248,240,0.95);
    border-top:1px solid #e0cfc2;
    padding:10px;
}

.nav-item{
    background:none;border:none;
    color:#a1887f;
}

.nav-item.active{color:#5c3a21}

/* MODAL */
.modal{
    display:none;
    position:fixed;inset:0;
    background:rgba(0,0,0,0.4);
    justify-content:center;
    align-items:center;
}

.modal.active{display:flex}

.modal-content{
    background:white;
    padding:20px;
    border-radius:16px;
    width:90%;max-width:400px;
}

input,select,textarea{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border:none;
    border-radius:10px;
    background:#efe2d6;
}

.btn-primary{
    background:#8b5e3c;
    color:white;
    border:none;
    padding:14px;
    border-radius:10px;
    width:100%;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="header-content">
        <h1 class="header-title">Marketplace Escolar</h1>
        <input id="searchInput" class="search-input" placeholder="Pesquisar produtos...">
    </div>
</div>

<!-- CATEGORY -->
<div class="category-filter">
    <div class="category-scroll">
        <button class="category-chip active" data-category="">Todos</button>
        <button class="category-chip" data-category="Material Escolar">Material</button>
        <button class="category-chip" data-category="Livros">Livros</button>
        <button class="category-chip" data-category="Uniformes">Uniformes</button>
        <button class="category-chip" data-category="Eletrônicos">Eletrônicos</button>
    </div>
</div>

<!-- PRODUCTS -->
<div class="products-container">
    <div id="productsGrid" class="products-grid"></div>
</div>

<!-- NAV -->
<div class="bottom-nav">
    <button class="nav-item active">Produtos</button>
    <button id="addBtn" class="nav-item">Adicionar</button>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <h3>Novo Produto</h3>
        <input id="name" placeholder="Nome">
        <input id="price" type="number" placeholder="Preço (AOA)">
        <select id="category">
            <option>Material Escolar</option>
            <option>Livros</option>
            <option>Uniformes</option>
            <option>Eletrônicos</option>
        </select>
        <input id="image" placeholder="URL da imagem">
        <button class="btn-primary" onclick="addProduct()">Salvar</button>
    </div>
</div>

<script>
let products=[
{name:'Caderno Universitário',price:2590,category:'Material Escolar',image:'https://images.unsplash.com/photo-1531346878377-a5be20888e57'},
{name:'Livro Matemática',price:8990,category:'Livros',image:'https://images.unsplash.com/photo-1544947950-fa07a98d237f'}
];

let filters={search:'',category:''};

function render(){
    const grid=document.getElementById('productsGrid');

    const filtered=products.filter(p=>
        p.name.toLowerCase().includes(filters.search.toLowerCase()) &&
        (filters.category===''||p.category===filters.category)
    );

    grid.innerHTML=filtered.map(p=>`
        <div class="product-card">
            <div class="product-image">
                <img src="${p.image}">
            </div>
            <div class="product-info">
                <div class="product-name">${p.name}</div>
                <div class="product-store">Loja Local</div>
                <div class="product-footer">
                    <span class="product-price">${p.price.toLocaleString('pt-AO')} AOA</span>
                    <span class="product-category">${p.category}</span>
                </div>
            </div>
        </div>
    `).join('');
}

// search
searchInput.addEventListener('input',e=>{
    filters.search=e.target.value;
    render();
});

// category

document.querySelectorAll('.category-chip').forEach(btn=>{
    btn.onclick=()=>{
        document.querySelectorAll('.category-chip').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        filters.category=btn.dataset.category;
        render();
    }
});

// modal
addBtn.onclick=()=>{
    modal.classList.add('active');
}

function addProduct(){
    products.push({
        name:name.value,
        price:Number(price.value),
        category:category.value,
        image:image.value
    });
    modal.classList.remove('active');
    render();
}

render();
</script>

</body>
</html>
